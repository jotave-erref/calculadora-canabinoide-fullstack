spring.application.name=cannabis-calculator

spring.datasource.url = jdbc:mysql://localhost:3306/cannabis_calculator?createDatabaseIfNotExist=true
spring.datasource.username = root
spring.datasource.password = root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true

# ===== Configurações OpenAI =====
# IMPORTANTE: Substitua pela sua chave API do OpenAI
openai.api.key={OPENAI_API_KEY:}
openai.api.url=https://api.openai.com
openai.model=gpt-3.5-turbo
openai.max-tokens=500
openai.temperature=0.7

# ===== Configurações OpenFeign =====
feign.client.config.openai-client.connect-timeout=10000
feign.client.config.openai-client.read-timeout=30000

# ===== Configurações Cache =====
spring.cache.type=simple
spring.cache.cache-names=chatResponses
